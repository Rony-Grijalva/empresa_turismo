services:
  db:
    image: postgres:16-alpine
    container_name: grijalva_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: grijalva_reservas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grijalva_reservas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
